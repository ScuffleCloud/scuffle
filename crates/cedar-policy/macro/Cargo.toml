[package]
name = "scuffle-cedar-policy-macro"
version = "0.1.0"
authors = ["Scuffle <opensource@scuffle.cloud>"]
documentation = "https://docs.rs/scuffle-cedar-policy-macro"
edition = "2024"
keywords = ["codgen", "cedar", "macro"]
license = "MIT OR Apache-2.0"
readme = "README.md"
repository = "https://github.com/scufflecloud/scuffle"

[lib]
proc-macro = true

[dependencies]
darling = "0.21"
proc-macro2 = "1"
quote = "1"
scuffle-cedar-policy-codegen = { version = "0.1.0", path = "../codegen" }
syn = "2"
