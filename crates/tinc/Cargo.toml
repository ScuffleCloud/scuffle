[package]
name = "tinc"
version = "0.1.0"
edition = "2024"

[dependencies]
serde = { version = "1.0.215", features = ["derive"] }
tonic = "0.12.3"
prost = "0.13.5"
chrono = "0.4.36"
prost-types = "0.13.5"
serde_json = "1.0.115"
itoa = "1.0.1"
ryu = "1.0.14"
scuffle-workspace-hack.workspace = true
serde_repr = "0.1.20"
axum = "0.8"
schemars = { version = "1.0.0-alpha.17", features = ["chrono04"] }
bytes = "1.6.0"
thiserror = "2"
http = "1"
http-body = "1"
http-body-util = "0.1.0"
mime = "0.3"
multer = "3.1"
accept-header = "0.2.3"
ordered-float = "5.0.0"
num-traits = "0.2.19"
fast-float2 = "0.2.3"
parse_int = "0.6.0"
